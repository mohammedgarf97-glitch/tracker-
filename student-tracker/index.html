<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Student Tracker - أ. محمد علي</title>
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ST رياضيات">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-logo">
      <div class="logo-circle">ST</div>
      <h1>Student Tracker</h1>
      <p>مركز أ. محمد علي للرياضيات</p>
    </div>

    <div class="login-card">
      <div class="tab-switch">
        <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="tab-btn" onclick="switchTab('register')">طالب جديد</button>
      </div>

      <div id="tab-login">
        <div class="form-group">
          <label>رقم الهاتف</label>
          <input type="tel" id="login-phone" placeholder="01XXXXXXXXX" class="input-field" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="login-pass" placeholder="••••••••" class="input-field">
        </div>
        <button class="btn-main" onclick="doLogin()">
          <i class="ti ti-login"></i> دخول
        </button>
        <div class="hint-text">
          للدخول كمعلم: هاتف <b>0000</b> / كلمة مرور <b>admin</b><br>
          للدخول كطالب: هاتف <b>0100</b> / كلمة مرور <b>1234</b>
        </div>
      </div>

      <div id="tab-register" style="display:none">
        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="reg-name" placeholder="أدخل اسمك الكامل" class="input-field">
        </div>
        <div class="form-group">
          <label>رقم الهاتف</label>
          <input type="tel" id="reg-phone" placeholder="01XXXXXXXXX" class="input-field" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>الصف الدراسي</label>
          <select id="reg-grade" class="input-field">
            <option value="">اختر صفك الدراسي</option>
            <option>الصف الرابع الابتدائي</option>
            <option>الصف الخامس الابتدائي</option>
            <option>الصف السادس الابتدائي</option>
            <option>الصف الأول الإعدادي</option>
            <option>الصف الثاني الإعدادي</option>
            <option>الصف الثالث الإعدادي</option>
          </select>
        </div>
        <div class="form-group">
          <label>كلمة مرور جديدة</label>
          <input type="password" id="reg-pass" placeholder="••••••••" class="input-field">
        </div>
        <button class="btn-main" onclick="doRegister()">
          <i class="ti ti-user-plus"></i> إرسال طلب الانتساب
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
